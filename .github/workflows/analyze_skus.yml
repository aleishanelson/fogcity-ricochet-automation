name: Analyze and Fix 2026 SKUs

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Run analysis and fix
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/analyze_skus.py 2>&1 | tee sku_report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: sku-report
          path: |
            sku_report.txt
            sku_report.json
