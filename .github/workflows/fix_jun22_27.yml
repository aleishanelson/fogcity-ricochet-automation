name: Fix Jun 22-27 SKUs and Revenue (one-off)

on:
  workflow_dispatch:   # run manually from the Actions tab

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install playwright google-auth google-auth-httplib2 google-api-python-client

      - name: Run backfill fix script
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/fix_jun22_27.py
